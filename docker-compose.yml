services:
  # -------------------------------------------------------------------------
  # Ollama — runs the LLM locally.
  # On first start the init container pulls the model automatically.
  # -------------------------------------------------------------------------
  ollama:
    image: docker.io/alpine/ollama:0.23.2
    container_name: budget-ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"       # Expose raw Ollama API (optional; remove for tighter security)
    volumes:
      - ollama_data:/root/.ollama   # Persist downloaded models across restarts
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}   # Allow concurrent model inference requests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------------------------
  # One-shot init container: pulls the model once Ollama is ready.
  # Retries until Ollama accepts connections so that `compose up -d` returns
  # immediately instead of blocking on the healthcheck condition.
  # -------------------------------------------------------------------------
  ollama-init:
    image: docker.io/alpine/ollama:0.23.2
    container_name: budget-ai-ollama-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_MODEL=qwen2.5-coder:7b
    entrypoint: ["sh", "-c", "n=0; until ollama pull $${DEFAULT_MODEL}; do n=$$((n+1)); if [ $$n -ge 24 ]; then echo 'ERROR: Ollama did not become ready after 2 minutes, giving up.'; exit 1; fi; echo \"Ollama not ready yet, retrying in 5s... (attempt $$n/24)\"; sleep 5; done"]
    restart: "no"

  # -------------------------------------------------------------------------
  # budget-ai API — FastAPI wrapper around Ollama.
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budget-ai-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - DEFAULT_MODEL=${DEFAULT_MODEL}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
